<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Unbiased 5-Player Ludo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="menu-overlay">
    <div id="menu-modal">
      <h1>Ludo</h1>
      <p>Select number of players:</p>
      <div class="menu-buttons">
        <button class="btn-menu" data-players="2">2 Players</button>
        <button class="btn-menu" data-players="3">3 Players</button>
        <button class="btn-menu" data-players="4">4 Players</button>
        <button class="btn-menu" data-players="5">5 Players</button>
      </div>
    </div>
  </div>

  <div id="game-container" style="display: none;">
    <div id="sidebar">
      <h1 id="game-title">Ludo</h1>
      <div id="turn-indicator">Turn: <span id="current-player-name" style="font-weight: 700;">-</span></div>
      <div style="display: flex; gap: 10px; margin-bottom: 10px;">
        <button id="btn-roll" style="flex: 1;">Roll Dice</button>
        <button id="btn-home" style="flex: 1; background: #e74c3c;">Home</button>
      </div>
      <div id="dice-result">-</div>
      
      <div class="histogram-container">
        <h3 style="margin-bottom: 5px;">Rolls</h3>
        <div id="histogram"></div>
      </div>
      
      <div id="message-area">Loading...</div>
    </div>
    <div id="board-container">
      <svg id="board-svg" viewBox="-400 -400 800 800" xmlns="http://www.w3.org/2000/svg">
        <g id="layer-paths"></g>
        <g id="layer-yards"></g>
        <g id="layer-tokens"></g>
      </svg>
    </div>
  </div>

  <script src="rng.js"></script>
  <script src="boardModel.js"></script>
  <script src="gameState.js"></script>
  <script src="render.js"></script>
</body>
</html>
